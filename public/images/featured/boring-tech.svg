    <text x="1050" y="210">blockchain</text>
    <text x="280" y="540">microservices</text>
    <text x="920" y="530">event-driven</text>
    <text x="100" y="390">serverless</text>
    <text x="1100" y="380">GraphQL</text>
    <text x="480" y="170">NoSQL</text>
    <text x="780" y="190">edge computing</text>
    <text x="180" y="300">web3</text>
