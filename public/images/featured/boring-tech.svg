    <text x="60" y="470">gRPC</text>
    <text x="1150" y="480">CQRS</text>
    <text x="550" y="260">lambda</text>
    <text x="850" y="440">terraform</text>
    <text x="300" y="440">headless</text>
    <text x="640" y="460">distributed</text>
    <text x="150" y="600">cloud-native</text>
    <text x="940" y="610">reactive</text>
    <text x="500" y="640">isomorphic</text>
    <text x="750" y="295">polyglot</text>
    <text x="1080" y="560">immutable</text>
    <text x="350" y="340">composable</text>
    <text x="620" y="350">decoupled</text>
  </g>

  <!-- "BORING." hero text -->
  <!-- Subtle warm glow behind text -->
  <text x="640" y="405" font-family="'Courier New', Courier, monospace" font-size="190" font-weight="700" fill="none" stroke="#8a8060" stroke-width="12" text-anchor="middle" opacity="0.03">BORING.</text>
  <text x="640" y="405" font-family="'Courier New', Courier, monospace" font-size="190" font-weight="700" fill="none" stroke="#8a8060" stroke-width="8" text-anchor="middle" opacity="0.04">BORING.</text>
  <text x="640" y="405" font-family="'Courier New', Courier, monospace" font-size="190" font-weight="700" fill="none" stroke="#8a8060" stroke-width="5" text-anchor="middle" opacity="0.06">BORING.</text>

  <!-- Main text -->
  <text x="640" y="405" font-family="'Courier New', Courier, monospace" font-size="190" font-weight="700" fill="#a09870" text-anchor="middle" opacity="0.9">BORING.</text>

  <!-- Understated tagline below -->
  <text x="640" y="450" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="300" fill="#6a6a58" text-anchor="middle" letter-spacing="8" opacity="0.6">AND THAT'S A GOOD THING</text>
