    <line x1="600" y1="0" x2="600" y2="720"/>
    <line x1="680" y1="0" x2="680" y2="720"/>
    <line x1="760" y1="0" x2="760" y2="720"/>
    <line x1="840" y1="0" x2="840" y2="720"/>
    <line x1="920" y1="0" x2="920" y2="720"/>
    <line x1="1000" y1="0" x2="1000" y2="720"/>
    <line x1="1080" y1="0" x2="1080" y2="720"/>
    <line x1="1160" y1="0" x2="1160" y2="720"/>
    <line x1="1240" y1="0" x2="1240" y2="720"/>
